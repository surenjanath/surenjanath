name: Latest Medium posts

on:
  schedule:
    - cron: "0 8 * * *"   # daily, ~4:00 AM Trinidad time
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull latest Medium posts into README
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://surenjanath.medium.com/feed"
          max_post_count: 5
          template: "- 📝 [$title]($url) — $date"
          date_format: "mmm d, yyyy"
          commit_message: "chore: update latest Medium posts"
